name: Deploy to Production Server

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Phoenix Server
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TS_AUTHKEY }}
          hostname: github-actions-deploy

      - name: Wait for Tailscale to settle
        run: sleep 5

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          command_timeout: 15m
          script: |
            powershell -ExecutionPolicy Bypass -File C:\phoenix-inventory\deploy.ps1

      - name: Report deploy status
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "Deploy succeeded at $(date)"
          else
            echo "Deploy failed — check SSH output above"
            exit 1
          fi
